name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality Gates (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run check
      - name: Test
        run: npm run test -- --run
      - name: Build
        run: npm run build

  api-quality:
    name: Quality Gates (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: theloop_test
          POSTGRES_USER: theloop
          POSTGRES_PASSWORD: theloop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Configure git
        run: |
          git config --global url."https://".insteadOf git://
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r requirements.txt
      - name: Lint
        run: ruff check src/ tests/
      - name: Type Check
        run: mypy src/ --strict
      - name: Apply migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://theloop:theloop@localhost:5432/theloop_test
          PYTHONPATH: .
      - name: Test with coverage
        run: pytest --cov=src --cov-fail-under=80
        env:
          DATABASE_URL: postgresql+asyncpg://theloop:theloop@localhost:5432/theloop_test
          FIREBASE_SERVICE_ACCOUNT: ''
      - name: Build Docker image
        run: docker build -t theloop-api:ci .

  api-security:
    name: Security Scan (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Build Docker image
        run: docker build -t theloop-api:ci apps/api/
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'theloop-api:ci'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  security:
    name: Security Scan (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Build Docker image
        run: docker build -t the-loop:ci apps/web/
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'the-loop:ci'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  docs:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Run docs generation
        run: bash scripts/generate-docs.sh
      - name: Verify docs are up-to-date
        run: git diff --exit-code
