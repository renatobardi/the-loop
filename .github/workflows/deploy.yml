name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: theloopoute
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy-web:
    name: Build & Deploy (Web)
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: the-loop
      IMAGE: us-central1-docker.pkg.dev/theloopoute/the-loop/app
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1090621437043/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@theloopoute.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=0
            --max-instances=10
            --port=3000
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=30s
            --ingress=internal-and-cloud-load-balancing
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            ADDRESS_HEADER=x-forwarded-for
            XFF_DEPTH=2
            PUBLIC_API_BASE_URL=https://theloop-api-1090621437043.us-central1.run.app
            PUBLIC_FIREBASE_PROJECT_ID=theloopoute
            PUBLIC_FIREBASE_API_KEY=AIzaSyDzQzgTvyPAMvQGrPMc8f36ysYZD1Xgalg
            PUBLIC_FIREBASE_AUTH_DOMAIN=theloopoute.firebaseapp.com
            PUBLIC_FIREBASE_STORAGE_BUCKET=theloopoute.firebasestorage.app
            PUBLIC_FIREBASE_MESSAGING_SENDER_ID=1090621437043
            PUBLIC_FIREBASE_APP_ID=1:1090621437043:web:a1f7e6582145f1cdb8a606

  deploy-api:
    name: Build & Deploy (API)
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: theloop-api
      IMAGE: us-central1-docker.pkg.dev/theloopoute/theloop-api/api
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1090621437043/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@theloopoute.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        continue-on-error: true
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=0
            --max-instances=10
            --port=8000
            --memory=512Mi
            --cpu=1
            --service-account=theloop-api-sa@theloopoute.iam.gserviceaccount.com
            --add-cloudsql-instances=theloopoute:southamerica-east1:theloop-db
            --allow-unauthenticated
            --no-gen2
          secrets: |
            DATABASE_URL=THELOOP_API_DATABASE_URL:latest
          env_vars: |
            CORS_ORIGINS=https://the-loop-1090621437043.us-central1.run.app
