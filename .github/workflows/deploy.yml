name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: theloopoute
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-web:
    name: Build & Deploy (Web)
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: the-loop
      IMAGE: us-central1-docker.pkg.dev/theloopoute/the-loop/app
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1090621437043/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@theloopoute.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=0
            --max-instances=10
            --port=3000
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=30s
            --ingress=internal-and-cloud-load-balancing
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            ADDRESS_HEADER=x-forwarded-for
            XFF_DEPTH=2
            PUBLIC_API_BASE_URL=https://api.loop.oute.pro
            PUBLIC_FIREBASE_PROJECT_ID=theloopoute
            PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY }}
            PUBLIC_FIREBASE_AUTH_DOMAIN=theloopoute.firebaseapp.com
            PUBLIC_FIREBASE_STORAGE_BUCKET=theloopoute.firebasestorage.app
            PUBLIC_FIREBASE_MESSAGING_SENDER_ID=1090621437043
            PUBLIC_FIREBASE_APP_ID=1:1090621437043:web:a1f7e6582145f1cdb8a606

  deploy-api:
    name: Build & Deploy (API)
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: theloop-api
      IMAGE: us-central1-docker.pkg.dev/theloopoute/theloop-api/api
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1090621437043/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@theloopoute.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: pip install -r requirements.txt
        working-directory: apps/api

      - name: Install Cloud SQL Auth Proxy and dependencies
        run: |
          # Install netcat for readiness checks
          apt-get update && apt-get install -y netcat-traditional

          # Download Cloud SQL Proxy
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Run database migrations
        run: |
          set -e
          set -o pipefail

          # Fetch DATABASE_URL from Secret Manager
          echo "Fetching database credentials..."
          DB_URL=$(gcloud secrets versions access latest --secret=THELOOP_API_DATABASE_URL)

          # Convert asyncpg → sync URL for alembic
          SYNC_URL="${DB_URL/+asyncpg/}"
          if [ -z "$SYNC_URL" ]; then
            echo "ERROR: Failed to convert database URL"
            exit 1
          fi

          # Start Cloud SQL Proxy in background with cleanup trap
          echo "Starting Cloud SQL Proxy..."
          ./cloud-sql-proxy theloopoute:southamerica-east1:theloop-db \
            --port=5432 --quiet &
          PROXY_PID=$!

          # Ensure proxy is killed on exit (success or failure)
          trap "kill $PROXY_PID 2>/dev/null || true" EXIT

          # Wait for proxy to be ready (poll for up to 30 seconds)
          echo "Waiting for Cloud SQL Proxy to be ready..."
          for i in {1..30}; do
            if nc -z localhost 5432 2>/dev/null; then
              echo "Cloud SQL Proxy is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Cloud SQL Proxy failed to start after 30 seconds"
              exit 1
            fi
            sleep 1
          done

          # Rewrite host to localhost:5432 preserving credentials
          # Cloud SQL connection string format:
          # postgresql://user:password@/DATABASE_NAME?host=/cloudsql/INSTANCE_ID

          # Extract database name (between @/ and ?)
          DB_NAME="${SYNC_URL#*@/}"        # Remove postgresql://user:pass@/
          DB_NAME="${DB_NAME%%\?*}"        # Remove ?host=... and everything after

          if [ -z "$DB_NAME" ]; then
            echo "ERROR: Failed to extract database name from URL"
            echo "DEBUG: SYNC_URL=$SYNC_URL"
            exit 1
          fi

          # Extract credentials: postgresql://user:password@
          CREDS="${SYNC_URL%%@*}@"

          ALEMBIC_URL="${CREDS}localhost:5432/${DB_NAME}"
          echo "Using database: $DB_NAME"

          # Run migrations
          echo "Running database migrations..."
          cd apps/api
          export DATABASE_URL="$ALEMBIC_URL"
          export PYTHONPATH=.
          alembic upgrade head
          echo "Migrations completed successfully"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=0
            --max-instances=10
            --port=8000
            --memory=512Mi
            --cpu=1
            --service-account=theloop-api-sa@theloopoute.iam.gserviceaccount.com
            --add-cloudsql-instances=theloopoute:southamerica-east1:theloop-db
            --allow-unauthenticated
          secrets: |
            DATABASE_URL=THELOOP_API_DATABASE_URL:latest
            GITHUB_TOKEN=GITHUB_TOKEN:latest
          env_vars: |
            CORS_ORIGINS=https://loop.oute.pro,http://localhost:5173

      - name: Sync releases from GitHub
        continue-on-error: true
        run: |
          # Validate required secret is set
          if [ -z "${{ secrets.ADMIN_SYNC_TOKEN }}" ]; then
            echo "WARNING: ADMIN_SYNC_TOKEN not configured. Release sync will be skipped."
            exit 0
          fi

          # Wait for API to be ready with exponential backoff (max 60 seconds)
          echo "Waiting for API to be ready..."
          max_attempts=6
          wait_time=10
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            echo "Health check attempt $attempt/$max_attempts (waiting ${wait_time}s)..."
            sleep $wait_time

            if curl -f -s https://api.loop.oute.pro/api/v1/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi

            if [ $attempt -eq $max_attempts ]; then
              echo "WARNING: API did not become ready after $(($wait_time * $max_attempts))s. Release sync will be attempted anyway."
              break
            fi

            wait_time=$((wait_time + 10))
            attempt=$((attempt + 1))
          done

          # Sync releases from GitHub
          echo "Syncing releases from GitHub..."
          sync_response=$(curl -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SYNC_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.loop.oute.pro/api/v1/admin/releases/sync \
            --max-time 30 2>/dev/null || echo "")

          http_code=$(echo "$sync_response" | tail -n1)
          body=$(echo "$sync_response" | head -n-1)

          if [ "$http_code" = "200" ]; then
            echo "Release sync succeeded: $body"
          else
            echo "WARNING: Release sync returned HTTP $http_code: $body"
          fi
