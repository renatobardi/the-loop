name: "🔁 The Loop — Incident Guard"

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  semgrep-scan:
    name: "Scan — Static Rules"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Scan with Semgrep
        run: semgrep scan --config .semgrep/theloop-rules.yml --json --output results.json || true

      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let message = '## 🔁 The Loop — Incident Guard\n\n';

            if (fs.existsSync('results.json')) {
              const data = JSON.parse(fs.readFileSync('results.json', 'utf8'));
              const results = data.results || [];
              if (results.length === 0) {
                message += '✅ **Clean scan** — No incident patterns detected.';
              } else {
                message += `Found ${results.length} issue(s):\n\n`;
                results.forEach(r => {
                  const severity = r.extra?.severity || 'INFO';
                  message += `- **${severity}**: ${r.check_id} at ${r.path}:${r.start?.line}\n`;
                });
              }
            } else {
              message += '⚠️ Scan did not complete.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
