# theloop-rules.yml
# The Loop — Complete Rule Set (v0.3.0 with 45 rules)
# Phase A (6) + Phase B (14) + Phase C (25) | 2026-04-05

rules:

  # PHASE A: 6 Base Rules

  - id: injection-001-sql-string-concat
    languages: [python, javascript, typescript, ruby]
    message: "[The Loop] SQL injection via string concatenation"
    severity: ERROR
    metadata:
      incident_id: injection-001
      category: injection
    patterns:
      - pattern-either:
          - pattern: $DB.execute("..." + $INPUT)
          - pattern: $DB.execute(f"...{$INPUT}...")

  - id: injection-002-eval-dynamic-input
    languages: [python, javascript, typescript, ruby]
    message: "[The Loop] eval() with dynamic input"
    severity: ERROR
    metadata:
      incident_id: injection-002
      category: injection
    patterns:
      - pattern-either:
          - pattern: eval($INPUT)
          - pattern: exec($INPUT)

  - id: unsafe-api-usage-001-shell-injection
    languages: [python]
    message: "[The Loop] Shell execution with variable"
    severity: ERROR
    metadata:
      incident_id: unsafe-api-usage-001
      category: unsafe-api-usage
    patterns:
      - pattern-either:
          - pattern: os.system($CMD)
          - pattern: subprocess.call($CMD, ..., shell=True)

  - id: missing-safety-check-001-hardcoded-secret
    languages: [generic]
    message: "[The Loop] Hardcoded credential detected"
    severity: ERROR
    metadata:
      incident_id: missing-safety-check-001
      category: missing-safety-check
    patterns:
      - pattern-regex: "(?i)(password|secret|api_key)\\s*[=:]\\s*[\"'][A-Za-z0-9]{8,}[\"']"
    paths:
      exclude:
        - "specs/"
        - "*.md"
        - "docs/"
        - "*.test.*"
        - "*.spec.*"
        - "tests/"
        - ".env.example"

  - id: missing-error-handling-001-bare-except
    languages: [python]
    message: "[The Loop] Bare except clause"
    severity: WARNING
    metadata:
      incident_id: missing-error-handling-001
      category: missing-error-handling
    pattern: |
      try:
          ...
      except:
          pass

  - id: unsafe-regex-001-redos-pattern
    languages: [python, javascript, typescript, java]
    message: "[The Loop] ReDoS pattern detected"
    severity: WARNING
    metadata:
      incident_id: unsafe-regex-001
      category: unsafe-regex
    patterns:
      - pattern-regex: "\\((\\..\\+|\\.\\*)[+*]"

  # PHASE B: 14 New Rules

  # INJECTION (3)
  - id: path-traversal-001
    languages: [python, javascript, java]
    message: "[The Loop] Path traversal vulnerability"
    severity: ERROR
    metadata:
      incident_id: path-traversal-001
      category: injection
      cwe: "CWE-22"
    patterns:
      - pattern-either:
          - pattern: open($INPUT, ...)
          - pattern: Path($INPUT).open(...)

  - id: xxe-001
    languages: [python, java, javascript]
    message: "[The Loop] XML External Entity (XXE) injection risk"
    severity: ERROR
    metadata:
      incident_id: xxe-001
      category: injection
      cwe: "CWE-611"
    patterns:
      - pattern-either:
          - pattern: ElementTree.parse($URL)
          - pattern: ET.parse($URL)

  - id: deserialization-001
    languages: [python, javascript, java]
    message: "[The Loop] Unsafe deserialization"
    severity: ERROR
    metadata:
      incident_id: deserialization-001
      category: injection
      cwe: "CWE-502"
    patterns:
      - pattern-either:
          - pattern: pickle.loads($DATA)
          - pattern: yaml.load($DATA)

  # CRYPTO (2)
  - id: crypto-weak-md5-001
    languages: [python, javascript, java]
    message: "[The Loop] MD5 used for hashing"
    severity: WARNING
    metadata:
      incident_id: crypto-weak-md5-001
      category: crypto
      cwe: "CWE-327"
    patterns:
      - pattern-either:
          - pattern: hashlib.md5($DATA)
          - pattern: crypto.createHash("md5")

  - id: crypto-weak-random-001
    languages: [python, javascript, java]
    message: "[The Loop] Weak random number generation"
    severity: WARNING
    metadata:
      incident_id: crypto-weak-random-001
      category: crypto
      cwe: "CWE-338"
    patterns:
      - pattern-either:
          - pattern: random.random()
          - pattern: Math.random()

  # SECURITY (3)
  - id: tls-verify-false-001
    languages: [python, javascript, java]
    message: "[The Loop] TLS certificate verification disabled"
    severity: ERROR
    metadata:
      incident_id: tls-verify-false-001
      category: security
      cwe: "CWE-295"
    patterns:
      - pattern-either:
          - pattern: requests.get(..., verify=False)
          - pattern: ssl._create_unverified_context()

  - id: jwt-hardcoded-001
    languages: [python, javascript, java]
    message: "[The Loop] Hardcoded JWT secret"
    severity: ERROR
    metadata:
      incident_id: jwt-hardcoded-001
      category: security
      cwe: "CWE-798"
    patterns:
      - pattern-regex: "(?i)jwt_secret\\s*[=:]\\s*[\"'][\\w\\-.]{20,}[\"']"

  - id: cors-wildcard-001
    languages: [python, javascript]
    message: "[The Loop] CORS with wildcard origin"
    severity: WARNING
    metadata:
      incident_id: cors-wildcard-001
      category: security
      cwe: "CWE-345"
    patterns:
      - pattern-regex: "Access-Control-Allow-Origin.*\\*"

  # PERFORMANCE (2)
  - id: sql-timeout-001
    languages: [python, javascript, java]
    message: "[The Loop] SQL query without timeout"
    severity: WARNING
    metadata:
      incident_id: sql-timeout-001
      category: performance
    patterns:
      - pattern: cursor.execute($QUERY)
      - pattern-not: cursor.execute($QUERY, timeout=$TIMEOUT)
      - pattern-not: cursor.execute($QUERY, ..., timeout=$TIMEOUT)

  - id: n-plus-one-001
    languages: [python]
    message: "[The Loop] N+1 query pattern"
    severity: WARNING
    metadata:
      incident_id: n-plus-one-001
      category: performance
    patterns:
      - pattern: |
          for ... in ...:
              ...
              $DB.query(...)

  # INFRASTRUCTURE (1)
  - id: docker-root-001
    languages: [generic]
    message: "[The Loop] Docker container runs as root"
    severity: WARNING
    metadata:
      incident_id: docker-root-001
      category: infrastructure
    patterns:
      - pattern-regex: "USER\\s+root"

  # CONFIG (2)
  - id: hardcoded-url-001
    languages: [python, javascript, go]
    message: "[The Loop] Hardcoded API URL in code"
    severity: WARNING
    metadata:
      incident_id: hardcoded-url-001
      category: config
    patterns:
      - pattern-regex: "(api_url|endpoint)\\s*[=:]\\s*[\"']https?://[^\"']+"

  - id: debug-enabled-prod-001
    languages: [python, javascript]
    message: "[The Loop] Debug mode enabled in production"
    severity: WARNING
    metadata:
      incident_id: debug-enabled-prod-001
      category: config
    patterns:
      - pattern-either:
          - pattern: DEBUG = True
          - pattern: app.run(debug=True)

  # DEPENDENCIES (1)
  - id: dependency-vulnerable-001
    languages: [generic]
    message: "[The Loop] Known vulnerable dependency"
    severity: WARNING
    metadata:
      incident_id: dependency-vulnerable-001
      category: dependencies
      cwe: "CWE-1104"
    patterns:
      - pattern-regex: "lodash.*<.*4\\.17\\.15"

  # PHASE C: 25 New Rules (v0.3.0)

  # JS/TS — INJECTION (4)

  - id: js-injection-001
    languages: [javascript, typescript]
    message: "[The Loop] SQL injection via string concatenation (JS/TS)"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-89"
    patterns:
      - pattern-either:
          - pattern: $DB.raw($X + $Y)
          - pattern: $CLIENT.query($X + $Y)
          - pattern: knex.raw($X + $Y)

  - id: js-injection-002
    languages: [javascript, typescript]
    message: "[The Loop] Dynamic code execution via Function constructor or eval"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-94"
    patterns:
      - pattern-either:
          - pattern: new Function($INPUT)
          - pattern: eval($INPUT)

  - id: js-injection-003
    languages: [javascript, typescript]
    message: "[The Loop] XSS via innerHTML assignment with dynamic value"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-79"
    pattern: $EL.innerHTML = $INPUT

  - id: js-injection-004
    languages: [javascript, typescript]
    message: "[The Loop] Shell injection via child_process with dynamic command"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-78"
    patterns:
      - pattern-either:
          - pattern: exec($CMD, ...)
          - pattern: execSync($CMD, ...)
          - pattern: spawn("sh", ["-c", $CMD], ...)

  # JS/TS — CRYPTO (2)

  - id: js-crypto-001
    languages: [javascript, typescript]
    message: "[The Loop] Weak cryptographic hash MD5 or SHA1"
    severity: WARNING
    metadata:
      category: crypto
      cwe: "CWE-327"
    patterns:
      - pattern-either:
          - pattern: crypto.createHash("md5")
          - pattern: crypto.createHash("sha1")

  - id: js-crypto-002
    languages: [javascript, typescript]
    message: "[The Loop] Math.random() is not cryptographically secure"
    severity: ERROR
    metadata:
      category: crypto
      cwe: "CWE-338"
    pattern: Math.random()

  # JS/TS — SECURITY (4)

  - id: js-security-001
    languages: [javascript, typescript]
    message: "[The Loop] JWT signed with hardcoded string secret"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798"
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "...")
          - pattern: sign($PAYLOAD, "...")

  - id: js-security-002
    languages: [javascript, typescript]
    message: "[The Loop] CORS configured with wildcard origin"
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-345"
    patterns:
      - pattern-either:
          - pattern: "cors({origin: \"*\"})"
          - pattern: "cors({..., origin: \"*\", ...})"

  - id: js-security-003
    languages: [javascript, typescript]
    message: "[The Loop] TLS certificate validation disabled via NODE_TLS_REJECT_UNAUTHORIZED"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-295"
    pattern: process.env.NODE_TLS_REJECT_UNAUTHORIZED = "0"

  - id: js-security-004
    languages: [javascript, typescript]
    message: "[The Loop] Prototype pollution risk via Object.assign with external input"
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-1321"
    pattern: Object.assign({}, $INPUT)

  # JS/TS — PERFORMANCE (1)

  - id: js-perf-001
    languages: [javascript, typescript]
    message: "[The Loop] await inside loop causes sequential execution (N+1 async)"
    severity: WARNING
    metadata:
      category: performance
    patterns:
      - pattern: |
          for (const $ITEM of $COLLECTION) {
              ...
              await $X
              ...
          }

  # JS/TS — CONFIG (2)

  - id: js-config-001
    languages: [javascript, typescript]
    message: "[The Loop] Sensitive field exposed via console.log"
    severity: WARNING
    metadata:
      category: config
    patterns:
      - pattern-either:
          - pattern: console.log(..., $X.password, ...)
          - pattern: console.log(..., $X.token, ...)
          - pattern: console.log(..., $X.secret, ...)
          - pattern: console.log(..., $X.apiKey, ...)

  - id: js-config-002
    languages: [javascript, typescript]
    message: "[The Loop] Hardcoded production/staging URL in source code"
    severity: WARNING
    metadata:
      category: config
    patterns:
      - pattern-regex: "https?://[a-z0-9.-]+(prod|production|live|staging)[a-z0-9.-]*"

  # TypeScript-specific (2)

  - id: ts-security-001
    languages: [typescript]
    message: "[The Loop] Parameter typed as 'any' bypasses TypeScript safety checks"
    severity: WARNING
    metadata:
      category: security
    patterns:
      - pattern: |
          function $F($X: any, ...) {
              ...
          }

  - id: ts-security-002
    languages: [typescript]
    message: "[The Loop] Forced double type assertion 'as unknown as T' bypasses type safety"
    severity: WARNING
    metadata:
      category: security
    pattern: ($X as unknown as $T)

  # GO — INJECTION (3)

  - id: go-injection-001
    languages: [go]
    message: "[The Loop] SQL injection via fmt.Sprintf in database query"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-89"
    patterns:
      - pattern-either:
          - pattern: $DB.Query(fmt.Sprintf($QUERY, ...))
          - pattern: $DB.Exec(fmt.Sprintf($QUERY, ...))
          - pattern: $DB.QueryRow(fmt.Sprintf($QUERY, ...))

  - id: go-injection-002
    languages: [go]
    message: "[The Loop] Shell injection via exec.Command with variable argument"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-78"
    patterns:
      - pattern: exec.Command($CMD, ...)
      - pattern-not: exec.Command("...", ...)

  - id: go-injection-003
    languages: [go]
    message: "[The Loop] Path traversal via filepath.Join with unvalidated input"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-22"
    patterns:
      - pattern-either:
          - pattern: filepath.Join($ROOT, $INPUT)
          - pattern: path.Join($ROOT, $INPUT)

  # GO — CRYPTO (2)

  - id: go-crypto-001
    languages: [go]
    message: "[The Loop] Weak cryptographic hash MD5 or SHA1"
    severity: WARNING
    metadata:
      category: crypto
      cwe: "CWE-327"
    patterns:
      - pattern-either:
          - pattern: md5.New()
          - pattern: sha1.New()

  - id: go-crypto-002
    languages: [go]
    message: "[The Loop] math/rand used for security-sensitive value — use crypto/rand"
    severity: ERROR
    metadata:
      category: crypto
      cwe: "CWE-338"
    patterns:
      - pattern-either:
          - pattern: rand.Read($BUF)
          - pattern: rand.Intn($N)
          - pattern: rand.Int63()

  # GO — SECURITY (2)

  - id: go-security-001
    languages: [go]
    message: "[The Loop] TLS certificate verification disabled via InsecureSkipVerify"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-295"
    pattern: |
      &tls.Config{
          ...,
          InsecureSkipVerify: true,
          ...,
      }

  - id: go-security-002
    languages: [go]
    message: "[The Loop] JWT signed with hardcoded byte-slice secret"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798"
    patterns:
      - pattern-either:
          - pattern: $TOKEN.SignedString([]byte("..."))
          - pattern: jwt.NewWithClaims($M, $C).SignedString([]byte("..."))

  # GO — ERROR HANDLING (2)

  - id: go-error-001
    languages: [go]
    message: "[The Loop] Error silently discarded with _ in critical database or file operation"
    severity: WARNING
    metadata:
      category: error-handling
    patterns:
      - pattern-either:
          - pattern: $X, _ = $DB.Query(...)
          - pattern: $X, _ = $DB.Exec(...)
          - pattern: $X, _ = os.Create(...)
          - pattern: $X, _ = os.Open(...)

  - id: go-error-002
    languages: [go]
    message: "[The Loop] panic() called inside HTTP handler — return an error response instead"
    severity: WARNING
    metadata:
      category: error-handling
    pattern: |
      func $HANDLER(w http.ResponseWriter, r *http.Request) {
          ...
          panic(...)
          ...
      }

  # GO — CONFIG (1)

  - id: go-config-001
    languages: [go]
    message: "[The Loop] http.ListenAndServe without TLS — use ListenAndServeTLS in production"
    severity: WARNING
    metadata:
      category: config
    pattern: http.ListenAndServe($ADDR, $HANDLER)

  # PHASE 1 (Spec-018): 15 Java Rules (v0.4.0)

  # JAVA — INJECTION (5)

  - id: java-injection-001
    languages: [java]
    message: "[The Loop] SQL injection via string concatenation with JDBC"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-89"
    patterns:
      - pattern-either:
          - pattern: $STMT.executeQuery($X + $INPUT)
          - pattern: $STMT.execute($X + $INPUT)
          - pattern: $STMT.executeUpdate($X + $INPUT)
          - pattern: $CONN.createStatement().execute($X + $INPUT)

  - id: java-injection-002
    languages: [java]
    message: "[The Loop] SQL injection via string interpolation in dynamic SQL"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-89"
    patterns:
      - pattern-either:
          - pattern: new PreparedStatement($X + $Y)
          - pattern: $CONNECTION.createStatement().execute($X + $Y)

  - id: java-injection-003
    languages: [java]
    message: "[The Loop] XPath injection via string concatenation"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-643"
    patterns:
      - pattern-either:
          - pattern: XPathFactory.newInstance().newXPath().compile("..." + $INPUT)
          - pattern: xpath.compile($X + $INPUT)

  - id: java-injection-004
    languages: [java]
    message: "[The Loop] Shell command injection via Runtime.exec()"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-78"
    patterns:
      - pattern-either:
          - pattern: Runtime.getRuntime().exec("..." + $INPUT)
          - pattern: Runtime.getRuntime().exec($CMD)
      - pattern-not: Runtime.getRuntime().exec(new String[] { ... })

  - id: java-injection-005
    languages: [java]
    message: "[The Loop] XXE (XML External Entity) injection risk"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-611"
    patterns:
      - pattern-either:
          - pattern: DocumentBuilderFactory.newInstance().newDocumentBuilder().parse($UNTRUSTED_INPUT)
          - pattern: SAXParserFactory.newInstance().newSAXParser().parse($UNTRUSTED_INPUT, ...)

  # JAVA — CRYPTO (3)

  - id: java-crypto-001
    languages: [java]
    message: "[The Loop] Weak cryptographic hash MD5 or SHA1"
    severity: WARNING
    metadata:
      category: crypto
      cwe: "CWE-327"
    patterns:
      - pattern-either:
          - pattern: MessageDigest.getInstance("MD5")
          - pattern: MessageDigest.getInstance("SHA1")
          - pattern: MessageDigest.getInstance("SHA-1")
          - pattern: Digest.getInstance("MD5")
          - pattern: DigestUtils.md5(...)
          - pattern: DigestUtils.sha1(...)

  - id: java-crypto-002
    languages: [java]
    message: "[The Loop] java.util.Random used for security-sensitive value — use SecureRandom"
    severity: ERROR
    metadata:
      category: crypto
      cwe: "CWE-338"
    patterns:
      - pattern-either:
          - pattern: new Random().nextInt(...)
          - pattern: new Random().nextLong()
          - pattern: new Random().nextDouble()
          - pattern: new Random().next$METHOD(...)

  - id: java-crypto-003
    languages: [java]
    message: "[The Loop] Hardcoded encryption key in source code"
    severity: ERROR
    metadata:
      category: crypto
      cwe: "CWE-798"
    patterns:
      - pattern-regex: "(?i)(encryption|cipher|secret).*Key.*=.*[\"'][A-Za-z0-9+/=]{16,}[\"']"

  # JAVA — SECURITY (4)

  - id: java-security-001
    languages: [java]
    message: "[The Loop] Hardcoded API key or database credential detected"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798"
    patterns:
      - pattern-regex: "(?i)(api_?key|password|db_?password|secret)\\s*=\\s*[\"'][^\"']{8,}[\"']"

  - id: java-security-002
    languages: [java]
    message: "[The Loop] TLS certificate verification disabled via X509TrustManager"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-295"
    patterns:
      - pattern: |
          new X509TrustManager() {
              ...
              public void checkServerTrusted(...) {
                  // No validation
              }
              ...
          }

  - id: java-security-003
    languages: [java]
    message: "[The Loop] Unsafe deserialization with ObjectInputStream"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-502"
    patterns:
      - pattern-either:
          - pattern: new ObjectInputStream($INPUT).readObject()
          - pattern: $OIS.readObject()
          - pattern: $OIS.readUnshared()

  - id: java-security-004
    languages: [java]
    message: "[The Loop] JDBC connection without SSL/TLS enabled"
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-295"
    patterns:
      - pattern: DriverManager.getConnection($URL, ...)
      - pattern-not: DriverManager.getConnection("...ssl=true...", ...)
      - pattern-not: DriverManager.getConnection("...sslMode=...", ...)

  # JAVA — PERFORMANCE (1)

  - id: java-perf-001
    languages: [java]
    message: "[The Loop] N+1 query pattern — database query inside loop"
    severity: WARNING
    metadata:
      category: performance
    patterns:
      - pattern: $DB.execute(...)
      - pattern-inside: |
          for (...) {
              ...
          }

  # JAVA — ERROR HANDLING (1)

  - id: java-error-001
    languages: [java]
    message: "[The Loop] Exception caught and silently discarded (empty catch block)"
    severity: WARNING
    metadata:
      category: error-handling
    patterns:
      - pattern: |
          try {
              ...
          } catch ($EXCEPTION $E) {
              // Empty or just logging
          }

  # JAVA — CONFIG (1)

  - id: java-config-001
    languages: [java]
    message: "[The Loop] Hardcoded production/staging URL in source code"
    severity: WARNING
    metadata:
      category: config
    patterns:
      - pattern-regex: "String.*=.*[\"']https?://[a-z0-9.-]+(prod|production|staging|live)[a-z0-9.-]*[\"']"

  # PHASE 2 (Spec-018): 15 C# Rules (v0.4.0)

  # C# — INJECTION (3)

  - id: csharp-sql-001
    languages: [csharp]
    message: "[The Loop] SQL injection via string concatenation with SqlCommand"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-89"
    patterns:
      - pattern-either:
          - pattern: new SqlCommand("..." + $INPUT, ...)
          - pattern: $CMD.CommandText = $X + $INPUT
          - pattern: SqlCommand($X + $INPUT, ...)

  - id: csharp-linq-001
    languages: [csharp]
    message: "[The Loop] LINQ injection via dynamic expression trees"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-89"
    patterns:
      - pattern-either:
          - pattern: $CTX.FromSqlRaw($X + $INPUT)
          - pattern: $CTX.FromSqlInterpolated($X + $INPUT)

  - id: csharp-injection-002
    languages: [csharp]
    message: "[The Loop] XPath injection in .NET XML parsing"
    severity: ERROR
    metadata:
      category: injection
      cwe: "CWE-643"
    patterns:
      - pattern-either:
          - pattern: $XPATH.Compile($X + $INPUT)
          - pattern: new XPathNavigator().Select($X + $INPUT)

  # C# — CRYPTO (2)

  - id: csharp-crypto-001
    languages: [csharp]
    message: "[The Loop] Weak hash algorithm (MD5 or SHA1) in cryptography"
    severity: WARNING
    metadata:
      category: crypto
      cwe: "CWE-327"
    patterns:
      - pattern-either:
          - pattern: MD5.Create()
          - pattern: SHA1.Create()
          - pattern: using (var hash = MD5.Create()) { ... }

  - id: csharp-crypto-002
    languages: [csharp]
    message: "[The Loop] Hardcoded encryption key in C# code"
    severity: ERROR
    metadata:
      category: crypto
      cwe: "CWE-798"
    patterns:
      - pattern-regex: "(?i)(encryptionkey|cipher.*key)\\s*=\\s*[\"']([A-Za-z0-9+/=]{16,})[\"']"

  # C# — SECURITY (3)

  - id: csharp-security-001
    languages: [csharp]
    message: "[The Loop] Hardcoded credential (password, API key) detected"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798"
    patterns:
      - pattern-regex: "(?i)(password|apikey|secret|token)\\s*=\\s*[\"'][^\"']{8,}[\"']"

  - id: csharp-security-002
    languages: [csharp]
    message: "[The Loop] TLS certificate validation disabled in HttpClientHandler"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-295"
    patterns:
      - pattern-either:
          - pattern: |
              new HttpClientHandler {
                  ...,
                  ServerCertificateCustomValidationCallback = ...
              }
          - pattern: $HANDLER.ServerCertificateCustomValidationCallback = ($X, $Y, $Z, $W) => true;

  - id: csharp-security-003
    languages: [csharp]
    message: "[The Loop] Unsafe BinaryFormatter deserialization"
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-502"
    patterns:
      - pattern-either:
          - pattern: new BinaryFormatter().Deserialize($STREAM)
          - pattern: BinaryFormatter $BF = ...;

  # C# — PERFORMANCE (2)

  - id: csharp-perf-001
    languages: [csharp]
    message: "[The Loop] N+1 query pattern in Entity Framework loop"
    severity: WARNING
    metadata:
      category: performance
    patterns:
      - pattern: $DB.Database.ExecuteSql(...)

  - id: csharp-perf-002
    languages: [csharp]
    message: "[The Loop] Missing .AsNoTracking() in readonly Entity Framework queries"
    severity: WARNING
    metadata:
      category: performance
    patterns:
      - pattern: $CTX.Set<$T>().Where(...).FirstOrDefault()
      - pattern-not: $CTX.Set<$T>().AsNoTracking().Where(...).FirstOrDefault()

  # C# — ERROR HANDLING (2)

  - id: csharp-error-001
    languages: [csharp]
    message: "[The Loop] Overly broad exception catch (catching Exception instead of specific type)"
    severity: WARNING
    metadata:
      category: error-handling
    patterns:
      - pattern: catch (Exception) { ... }

  - id: csharp-error-002
    languages: [csharp]
    message: "[The Loop] Swallowing exception without logging"
    severity: WARNING
    metadata:
      category: error-handling
    patterns:
      - pattern: catch (...) { }

  # C# — CONFIG (1)

  - id: csharp-config-001
    languages: [csharp]
    message: "[The Loop] Hardcoded production URL in application configuration"
    severity: WARNING
    metadata:
      category: config
    patterns:
      - pattern-regex: "[\"']https?://[a-z0-9.-]+(prod|production|staging|live)[a-z0-9.-]*[\"']"
